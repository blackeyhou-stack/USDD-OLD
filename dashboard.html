<title>USDDOLD Token Holder Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --text: #e2e8f0;
    --text-muted: #94a3b8;
    --text-dim: #64748b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: linear-gradient(135deg,#1a1d27,#0f1117); border-bottom: 1px solid var(--border); padding: 22px 32px; display:flex; align-items:center; justify-content:space-between; }
  .header-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
  .header-title span { color:#60a5fa; }
  .header-sub { font-size:13px; color:var(--text-muted); margin-top:4px; }

  /* Overview */
  .overview { padding:24px 32px 16px; display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; }
  .chain-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:18px; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; }
  .chain-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--cc); }
  .chain-card:hover { border-color:var(--cc); transform:translateY(-2px); box-shadow:0 8px 24px rgba(0,0,0,.3); }
  .chain-card.active { border-color:var(--cc); background:var(--surface2); box-shadow:0 0 0 1px var(--cc); }
  .cc-name { font-size:12px; font-weight:700; color:var(--cc); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; display:flex; align-items:center; gap:6px; }
  .cc-badge { font-size:10px; padding:2px 7px; border-radius:99px; background:rgba(255,255,255,.08); color:var(--text-muted); text-transform:none; letter-spacing:0; font-weight:400; }
  .cc-supply { font-size:22px; font-weight:700; line-height:1; }
  .cc-supply.sm { font-size:16px; }
  .cc-supply.xs { font-size:13px; }
  .cc-lbl { font-size:11px; color:var(--text-muted); margin-top:3px; }
  .cc-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .cc-metric-val { font-size:15px; font-weight:600; }
  .cc-metric-lbl { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .coming-soon { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(15,17,23,.6); backdrop-filter:blur(2px); border-radius:14px; font-size:13px; color:var(--text-muted); font-style:italic; }

  /* Detail */
  .detail { padding:0 32px 48px; }
  .detail-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border); }
  .detail-title { font-size:17px; font-weight:700; }
  .detail-title .ctag { font-size:12px; padding:3px 10px; border-radius:99px; margin-left:10px; font-weight:500; vertical-align:middle; }
  .detail-stats { display:flex; gap:24px; }
  .ds-val { font-size:16px; font-weight:700; }
  .ds-lbl { font-size:11px; color:var(--text-muted); margin-top:1px; text-align:right; }

  /* Legend */
  .legend { display:flex; gap:14px; flex-wrap:wrap; margin-bottom:12px; }
  .leg { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-muted); }
  .leg-dot { width:9px; height:9px; border-radius:2px; }

  /* Table */
  .tw { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { background:var(--surface2); padding:10px 14px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.6px; color:var(--text-muted); border-bottom:1px solid var(--border); white-space:nowrap; }
  th.r, td.r { text-align:right; }
  tbody tr { border-bottom:1px solid rgba(46,50,80,.5); transition:filter .15s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover td { filter:brightness(1.1); }
  td { padding:9px 14px; vertical-align:middle; }

  /* Row colors */
  tr.rp td  { background:rgba(59,130,246,.1); }
  tr.rm td  { background:rgba(100,116,139,.1); }
  tr.rb td  { background:rgba(249,115,22,.12); }
  tr.re td  { background:rgba(34,197,94,.09); }
  tr.ro td  { background:rgba(234,179,8,.07); }
  tr.rt td  { background:rgba(148,163,184,.14); font-weight:700; }

  /* Badges */
  .badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:99px; font-weight:600; white-space:nowrap; }
  .bp { background:rgba(59,130,246,.2); color:#93c5fd; border:1px solid rgba(59,130,246,.35); }
  .bm { background:rgba(100,116,139,.2); color:#94a3b8; border:1px solid rgba(100,116,139,.3); }
  .bb { background:rgba(249,115,22,.2); color:#fdba74; border:1px solid rgba(249,115,22,.35); }
  .be { background:rgba(34,197,94,.15); color:#86efac; border:1px solid rgba(34,197,94,.3); }
  .bo { background:rgba(234,179,8,.15); color:#fde68a; border:1px solid rgba(234,179,8,.25); }
  .bt { background:rgba(148,163,184,.2); color:#cbd5e1; border:1px solid rgba(148,163,184,.3); }

  /* Address */
  .alink { font-family:'SFMono-Regular',Consolas,monospace; font-size:11.5px; color:#60a5fa; text-decoration:none; }
  .alink:hover { text-decoration:underline; color:#93c5fd; }
  .alink .af { display:inline; }
  .alink .as { display:none; }

  .rank-n { color:var(--text-dim); font-size:12px; }
  .nlab { font-weight:500; }
  .he-label { color:#fb923c; font-weight:700; font-size:12px; }
  .note-t { font-size:11px; color:var(--text-dim); }

  /* Pct bar */
  .pbar-w { display:flex; align-items:center; gap:7px; }
  .pbar { flex:1; min-width:40px; max-width:90px; height:4px; background:rgba(255,255,255,.07); border-radius:2px; overflow:hidden; }
  .pbar-f { height:100%; border-radius:2px; }
  .pv { font-size:12px; white-space:nowrap; font-variant-numeric:tabular-nums; }

  /* BSC */
  .bsc-box { background:var(--surface); border:1px dashed var(--border); border-radius:12px; padding:36px; text-align:center; color:var(--text-muted); }
  .bsc-box h3 { color:var(--text); font-size:16px; margin-bottom:8px; }
  .bsc-box p { font-size:13px; line-height:1.7; }

  /* Tab Bar */
  .tab-bar { display:flex; gap:0; margin:28px 0 0; border-bottom:2px solid var(--border); }
  .tab-btn { padding:10px 26px; background:transparent; border:none; border-bottom:3px solid transparent; margin-bottom:-2px; color:var(--text-muted); font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; letter-spacing:.3px; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--text); border-bottom-color:#3b82f6; }
  .tab-pane { display:none; }
  .tab-pane.active { display:block; }

  /* Summary Table */
  .sum-wrap { background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; margin-top:20px; }
  .sum-table { width:100%; border-collapse:collapse; font-size:13px; }
  .sum-table th { background:var(--surface2); color:var(--text-muted); padding:10px 14px; text-align:right; font-weight:500; font-size:11px; letter-spacing:.5px; text-transform:uppercase; border-bottom:2px solid var(--border); white-space:nowrap; }
  .sum-table th.l { text-align:left; }
  .sum-table td { padding:9px 14px; border-bottom:1px solid rgba(255,255,255,.04); vertical-align:middle; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .sum-table td.r { text-align:right; }
  .sum-table tr.sum-prot td { background:rgba(59,130,246,.05); }
  .sum-table tr.sum-eoa  td { background:rgba(34,197,94,.05); }
  .sum-table tr.sum-sub  td { background:var(--surface2); font-weight:600; border-top:1px solid var(--border); border-bottom:2px solid var(--border); }
  .sum-chain { font-weight:700; font-size:14px; }
  .type-badge { display:inline-block; padding:2px 9px; border-radius:4px; font-size:11px; font-weight:600; }
  .tb-prot { background:rgba(59,130,246,.2); color:#60a5fa; }
  .tb-eoa  { background:rgba(34,197,94,.2);  color:#4ade80; }
  .he-val  { color:#fb923c; font-weight:600; }
  .sum-grand td { background:rgba(59,130,246,.1); font-weight:700; font-size:13px; border-top:2px solid var(--border); }

  ::-webkit-scrollbar { width:5px; height:5px; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @media (max-width:768px) {
    .overview,.detail { padding-left:16px; padding-right:16px; }
    .header { padding:14px 16px; }
    .alink .af { display:none; }
    .alink .as { display:inline; }
    .pbar { display:none; }
  }
</style>

// ═══════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════
let active = 'Tron';

function N(n, d=2) {
  if (n == null) return '—';
  return n.toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
}
function NI(n) { return n == null ? '—' : n.toLocaleString('en-US'); }

function short(a) {
  if (!a || a.length<=14) return a;
  return a.slice(0,8)+'…'+a.slice(-4);
}

const ROW_CLASS = {Protocol:'rp', Merged:'rm', Boss:'rb', EOA_Top10:'re', EOA_Others:'ro', TOTAL:'rt'};
const BADGE_CLASS = {Protocol:'bp', Merged:'bm', Boss:'bb', EOA_Top10:'be', EOA_Others:'bo', TOTAL:'bt'};
const BADGE_LABEL = {Protocol:'Protocol', Merged:'合并', Boss:'H', EOA_Top10:'EOA', EOA_Others:'其他', TOTAL:'TOTAL'};

function badge(cat) { return `<span class="badge ${BADGE_CLASS[cat]}">${BADGE_LABEL[cat]}</span>`; }

// ═══════════════════════════════════════════════
//  OVERVIEW
// ═══════════════════════════════════════════════
function renderOverview() {
  document.getElementById('overview').innerHTML = Object.entries(META).map(([name, m]) => {
    const d = DATA[name];
    const protAmt = (d.rows||[]).filter(r=>r.cat==='Protocol').reduce((s,r)=>s+r.amt,0);
    const bossAmt = (d.rows||[]).filter(r=>r.cat==='Boss').reduce((s,r)=>s+r.amt,0);
    const protPct = d.totalSupply ? (protAmt/d.totalSupply*100) : null;
    const bossPct = d.totalSupply ? (bossAmt/d.totalSupply*100) : null;
    const isActive = name===active;
    const supplyStr = !d.totalSupply ? '—' : N(d.totalSupply, 2);
    return `
    <div class="chain-card ${isActive?'active':''}" style="--cc:${m.cc}" onclick="pick('${name}')">
      <div class="cc-name">${m.label}${m.comingSoon?'<span class="cc-badge">待补充</span>':''}</div>
      <div class="cc-supply ${d.totalSupply>=1e8?'xs':d.totalSupply>=1e6?'sm':''}">${supplyStr}</div>
      <div class="cc-lbl">Total Supply (USDDOLD)</div>
      <div class="cc-grid">
        <div><div class="cc-metric-val">${NI(d.holders)}</div><div class="cc-metric-lbl">Holders</div></div>
        <div><div class="cc-metric-val">${protPct!=null?protPct.toFixed(1)+'%':'—'}</div><div class="cc-metric-lbl">Protocol %</div></div>
        <div><div class="cc-metric-val">${bossPct!=null&&bossPct>0?bossPct.toFixed(2)+'%':'—'}</div><div class="cc-metric-lbl">H %</div></div>
        <div><div class="cc-metric-val">${NI(d.rows.filter(r=>r.cat==='Boss').length)||'—'}</div><div class="cc-metric-lbl">H 地址</div></div>
      </div>
      ${m.comingSoon?'<div class="coming-soon">截图数据补充中...</div>':''}
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════
//  DETAIL
// ═══════════════════════════════════════════════
function renderDetail(name) {
  const el = document.getElementById('detail');
  const m = META[name]; const d = DATA[name];

  if (d.comingSoon) {
    el.innerHTML = `
      <div class="detail-head">
        <div class="detail-title">链明细 <span class="ctag" style="background:${m.cc}22;color:${m.cc};border:1px solid ${m.cc}44">${m.label}</span></div>
      </div>
      <div class="bsc-box">
        <div style="font-size:32px;margin-bottom:10px">🔜</div>
        <h3>BSC 数据待补充</h3>
        <p>BSC 链暂无免费公开 API，等待人工截图数据录入后将显示在此处。</p>
      </div>`;
    return;
  }

  // Shown rows: Protocol / Boss / EOA_Top10 only
  const shownRows = d.rows.filter(r => r.cat === 'Protocol' || r.cat === 'Boss' || r.cat === 'EOA_Top10');
  const shownSum  = shownRows.reduce((s, r) => s + r.amt, 0);
  const otherAmt  = d.totalSupply - shownSum;
  const otherPct  = d.totalSupply ? otherAmt / d.totalSupply * 100 : 0;

  const maxAmt = Math.max(...shownRows.map(r => r.amt));

  function renderRow(row) {
    // address cell
    const addrCell = row.addr
      ? `<a class="alink" href="${m.ex}${row.addr}" target="_blank" rel="noopener">
           <span class="af">${row.addr}</span><span class="as">${short(row.addr)}</span>
         </a>`
      : `<span class="note-t">—</span>`;

    // name cell
    let nameCell;
    if (row.cat === 'Boss') {
      nameCell = `<span class="he-label">⭐ H</span>`;
    } else if (row.name) {
      nameCell = `<span class="nlab">${row.name}</span>`;
    } else {
      nameCell = `<span class="note-t">—</span>`;
    }

    // pct bar
    const bw = maxAmt > 0 ? Math.min(100, row.amt / maxAmt * 100) : 0;
    const barColor = row.cat === 'Boss' ? '#fb923c' : m.cc;
    const pctCell = `
      <div class="pbar-w">
        <div class="pbar"><div class="pbar-f" style="width:${bw}%;background:${barColor}"></div></div>
        <span class="pv">${row.pct.toFixed(row.pct >= 0.001 ? 4 : 6)}%</span>
      </div>`;

    const noteText = (row.note && row.cat !== 'EOA_Top10' && row.cat !== 'Boss')
      ? `<span class="note-t">${row.note}</span>` : '';

    return `
      <tr class="${ROW_CLASS[row.cat]}">
        <td>${badge(row.cat)}</td>
        <td class="r rank-n">${row.rank != null ? '#' + row.rank : '—'}</td>
        <td>${addrCell}</td>
        <td>${nameCell}</td>
        <td class="r">${N(row.amt)}</td>
        <td class="r">${pctCell}</td>
        <td>${noteText}</td>
      </tr>`;
  }

  const rows =
    shownRows.map(renderRow).join('') +
    // ── 其他（合并）: 合约 + 未展示地址 ──
    `<tr class="ro">
      <td>${badge('EOA_Others')}</td>
      <td class="r rank-n">—</td>
      <td><span class="note-t">—</span></td>
      <td><span class="nlab">其他（合并）</span></td>
      <td class="r">${N(otherAmt)}</td>
      <td class="r">
        <div class="pbar-w">
          <div class="pbar"><div class="pbar-f" style="width:0%;background:${m.cc}"></div></div>
          <span class="pv">${otherPct.toFixed(otherPct >= 0.001 ? 4 : 6)}%</span>
        </div>
      </td>
      <td><span class="note-t">合约 + 未展示地址合并</span></td>
    </tr>` +
    // ── CHAIN TOTAL = TotalSupply ──
    `<tr class="rt">
      <td>${badge('TOTAL')}</td>
      <td class="r">—</td>
      <td colspan="2"><strong>CHAIN TOTAL</strong></td>
      <td class="r"><strong>${N(d.totalSupply)}</strong></td>
      <td class="r"><strong>100.0000%</strong></td>
      <td></td>
    </tr>`;

  const bossCount = shownRows.filter(r => r.cat === 'Boss').length;

  el.innerHTML = `
    <div class="detail-head">
      <div class="detail-title">
        链明细数据
        <span class="ctag" style="background:${m.cc}22;color:${m.cc};border:1px solid ${m.cc}44">${m.label} · ${name}</span>
        ${bossCount>0?`<span class="ctag" style="background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.35)">⭐ ${bossCount} H 地址</span>`:''}
      </div>
      <div class="detail-stats">
        <div><div class="ds-val">${N(d.totalSupply)}</div><div class="ds-lbl">Total Supply</div></div>
        <div><div class="ds-val">${NI(d.holders)}</div><div class="ds-lbl">Total Holders</div></div>
      </div>
    </div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:#3b82f6"></div>Protocol 合约</div>
      <div class="leg"><div class="leg-dot" style="background:#f97316"></div>H</div>
      <div class="leg"><div class="leg-dot" style="background:#22c55e"></div>EOA 个人</div>
      <div class="leg"><div class="leg-dot" style="background:#eab308"></div>其他（合并）</div>
    </div>
    <div class="tw">
      <table>
        <thead>
          <tr>
            <th>类型</th><th class="r">排名</th><th>地址</th>
            <th>名称 / 标签</th><th class="r">USDDOLD 数量</th>
            <th class="r">占比</th><th>备注</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function showTab(t) {
  ['detail','summary'].forEach(id => {
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
    document.getElementById('tb-'+id).classList.toggle('active', id===t);
  });
  if (t==='summary') document.getElementById('summary').scrollIntoView({behavior:'smooth',block:'start'});
}

    eoa: { total:448.49, he:0,  comm:448.49 } },
  { chain:'Arbitrum', cc:'#22d3ee', supply:169706.64, holders:1368,
    prot:{ total:168278.98, he:109463.04, comm:58815.94 },
    eoa: { total:1427.66, he:58568.37,  comm:-57140.71 } },
];

function renderSummary() {
  const el = document.getElementById('summary');
  const grandSupply  = SUMMARY.reduce((s,r)=>s+r.supply,0);
  const grandHolders = SUMMARY.reduce((s,r)=>s+r.holders,0);
  const grandHE      = SUMMARY.reduce((s,r)=>s+r.prot.he+r.eoa.he,0);
  const grandComm    = SUMMARY.reduce((s,r)=>s+r.prot.comm+r.eoa.comm,0);
  const grandTotal   = SUMMARY.reduce((s,r)=>s+r.prot.total+r.eoa.total,0);

  const rows = SUMMARY.map(r => {
    const chainTotal = r.prot.total + r.eoa.total;
    const chainHE    = r.prot.he + r.eoa.he;
    const chainComm  = r.prot.comm + r.eoa.comm;
    return `
      <tr class="sum-prot">
        <td rowspan="3" class="sum-chain"><span style="color:${r.cc}">${r.chain}</span></td>
        <td rowspan="3" class="r">${N(r.supply)}</td>
        <td rowspan="3" class="r">${NI(r.holders)}</td>
        <td><span class="type-badge tb-prot">协议</span></td>
        <td class="r">${N(r.prot.total)}</td>
        <td class="r">${r.prot.he>0?`<span class="he-val">${N(r.prot.he)}</span>`:'—'}</td>
        <td class="r">${N(r.prot.comm)}</td>
      </tr>
      <tr class="sum-eoa">
        <td><span class="type-badge tb-eoa">EOA</span></td>
        <td class="r">${N(r.eoa.total)}</td>
        <td class="r">${r.eoa.he>0?`<span class="he-val">${N(r.eoa.he)}</span>`:'—'}</td>
        <td class="r">${N(r.eoa.comm)}</td>
      </tr>
      <tr class="sum-sub">
        <td style="color:var(--text-muted);font-size:11px">小计</td>
        <td class="r">${N(chainTotal)}</td>
        <td class="r he-val">${N(chainHE)}</td>
        <td class="r">${N(chainComm)}</td>
      </tr>`;
  }).join('');

  el.innerHTML = `
    <div class="sum-wrap">
      <table class="sum-table">
        <thead>
          <tr>
            <th class="l">链</th>
            <th class="l">Total Supply</th>
            <th class="l">Holders</th>
            <th class="l">类型</th>
            <th>总量</th>
            <th>H</th>
            <th>社区</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
          <tr class="sum-grand">
            <td colspan="4"><strong>全链合计</strong></td>
            <td class="r">${N(grandTotal)}</td>
            <td class="r he-val">${N(grandHE)}</td>
            <td class="r">${N(grandComm)}</td>
          </tr>
        </tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
function pick(name) {
  active = name;
  renderOverview();
  showTab('detail');
  renderDetail(name);
  document.getElementById('detail').scrollIntoView({behavior:'smooth',block:'start'});
}

renderOverview();
renderDetail(active);
renderSummary();
</script>
